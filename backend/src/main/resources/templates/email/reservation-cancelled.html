<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Réservation annulée</title>
<style>
body{font-family:'Georgia',serif;background:#f9f5f0;margin:0;padding:0;color:#3d2b1f;}
.container{max-width:620px;margin:30px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.08);}
.header{background:linear-gradient(135deg,#c0392b,#e74c3c);padding:40px 30px;text-align:center;}
.header h1{color:#fff;font-size:28px;margin:0;}.header p{color:#fde8e8;margin:8px 0 0;}
.body{padding:35px 40px;}
.info-box{background:#fdf6ee;border-left:4px solid #e74c3c;border-radius:6px;padding:20px 24px;margin:20px 0;}
.info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed #e8d5c0;font-size:14px;}
.info-row:last-child{border-bottom:none;}.label{color:#888;}.value{font-weight:bold;}
.btn{display:block;text-align:center;background:#8B4513;color:#fff !important;padding:14px;border-radius:25px;text-decoration:none;margin:24px auto;width:200px;}
.footer{background:#f5ede4;padding:20px;text-align:center;font-size:12px;color:#a0856e;}
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1>🕌 Riad</h1><p>Réservation annulée</p></div>
  <div class="body">
    <p>Cher(e) <strong th:text="${user.getFullName()}">Client</strong>,</p>
    <p>Votre réservation <strong th:text="${reservation.reservationNumber}">RIAD-XXXX</strong> a été annulée.</p>
    <div class="info-box">
      <div class="info-row"><span class="label">Chambre</span><span class="value" th:text="${room.name}"></span></div>
      <div class="info-row"><span class="label">Arrivée initiale</span><span class="value" th:text="${#temporals.format(reservation.checkIn,'dd/MM/yyyy')}"></span></div>
      <div class="info-row"><span class="label">Annulée le</span><span class="value" th:text="${#temporals.format(reservation.cancelledAt,'dd/MM/yyyy HH:mm')}"></span></div>
      <div class="info-row" th:if="${reservation.cancellationReason != null}">
        <span class="label">Raison</span><span class="value" th:text="${reservation.cancellationReason}"></span>
      </div>
    </div>
    <p>Nous espérons vous accueillir au Riad une prochaine fois. Pour toute question, contactez-nous.</p>
    <a th:href="${frontendUrl}" class="btn">Réserver à nouveau</a>
  </div>
  <div class="footer">📍 Medina, Marrakech, Maroc | contact@riad.ma</div>
</div>
</body>
</html>
