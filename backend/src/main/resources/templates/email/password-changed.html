<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Mot de passe modifié</title>
<style>
body{font-family:'Georgia',serif;background:#f9f5f0;margin:0;padding:0;}
.container{max-width:580px;margin:30px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.08);}
.header{background:linear-gradient(135deg,#27ae60,#2ecc71);padding:36px;text-align:center;}
.header h1{color:#fff;font-size:26px;margin:0;}
.body{padding:32px 40px;}
.footer{background:#f5ede4;padding:18px;text-align:center;font-size:12px;color:#a0856e;}
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1>🔐 Mot de passe modifié</h1></div>
  <div class="body">
    <p>Bonjour <strong th:text="${user.firstName}">Prénom</strong>,</p>
    <p>Votre mot de passe a été modifié avec succès. ✅</p>
    <p>Si vous n'êtes pas à l'origine de cette modification, contactez-nous immédiatement à <a href="mailto:contact@riad.ma">contact@riad.ma</a>.</p>
  </div>
  <div class="footer">📍 Medina, Marrakech, Maroc | contact@riad.ma</div>
</div>
</body>
</html>
